<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HUB HACK | PRIVATE NODE</title>
    <style>
        :root { --neon: #00ff41; --red: #ff003c; --bg: #000; }
        body { margin: 0; background: var(--bg); color: var(--neon); font-family: 'Consolas', monospace; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Эффект шума старого монитора */
        body::after { content: " "; position: fixed; inset: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%); z-index: 10; pointer-events: none; opacity: 0.3; }

        #auth { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 2px solid var(--red); margin: 15px; }
        #nick-input { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 15px; width: 250px; text-align: center; outline: none; font-family: inherit; margin-bottom: 20px; font-size: 1.2rem; }
        #auth-btn { background: var(--red); border: none; color: #000; padding: 15px 40px; cursor: pointer; font-weight: bold; font-family: inherit; transition: 0.3s; }
        #auth-btn:hover { background: #fff; box-shadow: 0 0 20px var(--red); }

        header { padding: 15px 20px; background: #050505; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; font-size: 0.9rem; letter-spacing: 2px; }
        #messages { flex-grow: 1; overflow-y: auto; padding: 20px; list-style: none; margin: 0; scrollbar-width: none; }
        .msg-line { margin-bottom: 12px; padding: 10px; border-left: 2px solid #111; background: rgba(0,255,65,0.02); }
        .n { color: var(--red); font-weight: bold; text-shadow: 0 0 5px var(--red); }
        .t { color: #eee; margin-left: 10px; }
        .time { color: #333; font-size: 0.7rem; margin-right: 10px; }

        #form { display: flex; padding: 20px; background: #050505; border-top: 1px solid #1a1a1a; }
        #input { flex-grow: 1; background: transparent; border: none; color: var(--neon); outline: none; font-family: inherit; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div id="auth">
        <h1 style="color: var(--red); letter-spacing: 5px;">HUB HACK :: AUTH</h1>
        <input type="text" id="nick-input" placeholder="CODE NAME" maxlength="12" autofocus>
        <button id="auth-btn">EXECUTE LOGIN</button>
    </div>

    <header>
        <div>NODE_STATUS: <span style="color:white">ENCRYPTED</span></div>
        <div id="user-display">ID: GUEST</div>
    </header>

    <ul id="messages"></ul>

    <form id="form">
        <span style="margin-right: 15px; color: var(--red)">>>></span>
        <input id="input" autocomplete="off" placeholder="Введите данные..." />
    </form>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const auth = document.getElementById('auth');
        const ni = document.getElementById('nick-input');
        const ab = document.getElementById('auth-btn');
        const msgList = document.getElementById('messages');
        const input = document.getElementById('input');
        let myNick = "";

        function login() {
            if (ni.value.trim()) {
                myNick = ni.value.trim().toUpperCase();
                auth.style.display = 'none';
                document.getElementById('user-display').innerText = "ID: " + myNick;
                input.focus();
            }
        }

        ab.onclick = login;
        ni.onkeydown = (e) => { if(e.key === 'Enter') login(); };

        document.getElementById('form').onsubmit = (e) => {
            e.preventDefault();
            if (input.value && myNick) {
                socket.emit('chat message', { nick: myNick, text: input.value });
                input.value = '';
            }
        };
socket.on('chat message', (data) => {
            const li = document.createElement('li');
            li.className = 'msg-line';
            li.innerHTML = <span class="time">${data.time}</span><span class="n">${data.nick}:</span><span class="t">${data.text}</span>;
            msgList.appendChild(li);
            msgList.scrollTop = msgList.scrollHeight;
        });
    </script>
</body>
</html>
